<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galli, Santin — f(x) XR</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap');

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body, html {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #04080f;
        color: #c8dff8;
        font-family: 'JetBrains Mono', monospace;
      }

      /* ══════════════════════════════════════════
         PANEL
      ══════════════════════════════════════════ */
      #panel {
        position: absolute;
        left: 1.1rem; top: 1.1rem;
        width: 300px;
        z-index: 10;
        border-radius: 16px;
        overflow: hidden;
        /* layered border trick */
        background:
          linear-gradient(135deg, rgba(40,120,220,0.08) 0%, rgba(10,30,70,0.0) 60%),
          rgba(5, 11, 26, 0.9);
        border: 1px solid rgba(80, 180, 255, 0.18);
        backdrop-filter: blur(24px) saturate(1.6);
        box-shadow:
          0 0 0 1px rgba(120,210,255,0.06) inset,
          0 8px 40px rgba(0,0,0,0.7),
          0 0 60px rgba(60,160,255,0.06);
      }

      /* top accent bar */
      #panel::before {
        content: '';
        display: block;
        height: 2px;
        background: linear-gradient(90deg,
          transparent 0%,
          #3af 18%,
          #7af 40%,
          #f6a 65%,
          #fd6 85%,
          transparent 100%);
        opacity: 0.7;
      }

      .panel-inner { padding: 0.9rem 1rem 1rem; }

      /* ── header ── */
      .ph {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 0.8rem;
      }
      .ph-left { display: flex; flex-direction: column; gap: 0.05rem; }
      .ph-title {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700; font-size: 0.88rem;
        color: #7dd6ff; letter-spacing: 0.03em;
        text-transform: uppercase;
      }
      .ph-sub {
        font-size: 0.62rem;
        color: rgba(140,190,240,0.45);
        letter-spacing: 0.06em;
      }
      /* live indicator */
      .live-dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: #3f6;
        box-shadow: 0 0 6px #3f6;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,100% { opacity: 1; transform: scale(1); }
        50%      { opacity: 0.5; transform: scale(0.75); }
      }

      /* ── section label ── */
      .sec-label {
        font-size: 0.58rem; letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(100,160,220,0.45);
        margin-bottom: 0.42rem;
        margin-top: 0.72rem;
      }

      /* ── f(x) input ── */
      .fx-row {
        display: flex; align-items: center; gap: 0.38rem;
      }
      .fx-lbl {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700; font-size: 0.78rem;
        color: #fad85a; flex-shrink: 0;
        letter-spacing: 0.01em;
      }
      #fxInput {
        flex: 1; min-width: 0;
        background: rgba(50,120,220,0.08);
        border: 1px solid rgba(80,160,255,0.22);
        border-radius: 8px;
        padding: 0.32rem 0.55rem;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.78rem;
        color: #e8f4ff; outline: none;
        transition: border-color .18s, box-shadow .18s;
        caret-color: #7dd6ff;
      }
      #fxInput:focus {
        border-color: rgba(100,200,255,0.5);
        box-shadow: 0 0 0 3px rgba(80,180,255,0.1);
      }
      #applyBtn {
        flex-shrink: 0;
        background: linear-gradient(135deg, #3af 0%, #29e 100%);
        color: #02060f;
        border: none; border-radius: 8px;
        padding: 0.32rem 0.6rem;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700; font-size: 0.68rem;
        cursor: pointer; letter-spacing: 0.06em;
        text-transform: uppercase;
        transition: opacity .15s, transform .1s, box-shadow .15s;
        box-shadow: 0 2px 10px rgba(60,170,255,0.3);
      }
      #applyBtn:hover { opacity: 0.88; box-shadow: 0 2px 14px rgba(60,170,255,0.5); }
      #applyBtn:active { transform: scale(0.94); }

      #fxError {
        font-size: 0.66rem; color: #ff7aac;
        min-height: 0.85rem; margin-top: 0.28rem;
        padding-left: 0.1rem;
      }

      /* ── sliders ── */
      .sr {
        display: grid;
        grid-template-columns: 22px 1fr 46px;
        gap: 0.4rem; align-items: center;
        margin-bottom: 0.48rem;
      }
      .sr:last-of-type { margin-bottom: 0; }

      .sn {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700; font-size: 0.76rem;
        text-align: center;
      }
      .sn.a  { color: #5ae4ff; text-shadow: 0 0 8px rgba(90,228,255,0.6); }
      .sn.b  { color: #ff7aac; text-shadow: 0 0 8px rgba(255,122,172,0.6); }
      .sn.xo { color: #fad85a; text-shadow: 0 0 8px rgba(250,216,90,0.6); }

      .sv {
        font-size: 0.7rem; text-align: right;
        color: rgba(180,220,255,0.5);
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.02em;
      }

      input[type='range'] {
        -webkit-appearance: none; appearance: none;
        width: 100%; height: 3px; border-radius: 2px;
        background: rgba(30,70,140,0.6);
        outline: none; cursor: pointer;
      }

      #aSlider { background: linear-gradient(90deg, rgba(90,228,255,0.35) var(--pct,50%), rgba(30,70,140,0.5) var(--pct,50%)); }
      #bSlider { background: linear-gradient(90deg, rgba(255,122,172,0.35) var(--pct,50%), rgba(30,70,140,0.5) var(--pct,50%)); }
      #xSlider { background: linear-gradient(90deg, rgba(250,216,90,0.35) var(--pct,50%), rgba(30,70,140,0.5) var(--pct,50%)); }

      #aSlider::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:#5ae4ff; box-shadow:0 0 6px rgba(90,228,255,0.7), 0 0 14px rgba(90,228,255,0.3); }
      #aSlider::-moz-range-thumb     { width:13px; height:13px; border-radius:50%; background:#5ae4ff; border:none; box-shadow:0 0 6px rgba(90,228,255,0.7); }

      #bSlider::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:#ff7aac; box-shadow:0 0 6px rgba(255,122,172,0.7), 0 0 14px rgba(255,122,172,0.3); }
      #bSlider::-moz-range-thumb     { width:13px; height:13px; border-radius:50%; background:#ff7aac; border:none; box-shadow:0 0 6px rgba(255,122,172,0.7); }

      #xSlider::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:#fad85a; box-shadow:0 0 6px rgba(250,216,90,0.7), 0 0 14px rgba(250,216,90,0.3); }
      #xSlider::-moz-range-thumb     { width:13px; height:13px; border-radius:50%; background:#fad85a; border:none; box-shadow:0 0 6px rgba(250,216,90,0.7); }

      /* ── divider ── */
      .div {
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(80,160,255,0.15), transparent);
        margin: 0.65rem 0;
      }

      /* ── hint ── */
      .hint {
        font-size: 0.62rem;
        color: rgba(140,180,230,0.32);
        line-height: 1.65;
        margin-top: 0.6rem;
      }
      .hint b { color: rgba(120,210,255,0.55); font-weight: 500; }

      /* ── examples ── */
      .examples {
        display: flex; flex-wrap: wrap; gap: 0.28rem;
        margin-top: 0.5rem;
      }
      .ex-chip {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.6rem;
        padding: 0.18rem 0.45rem;
        background: rgba(50,120,220,0.1);
        border: 1px solid rgba(80,160,255,0.16);
        border-radius: 4px;
        color: rgba(160,210,255,0.55);
        cursor: pointer;
        transition: background .15s, color .15s, border-color .15s;
        user-select: none;
      }
      .ex-chip:hover {
        background: rgba(60,140,255,0.18);
        color: #9dd4ff;
        border-color: rgba(100,180,255,0.3);
      }

      canvas { display: block; }
    </style>
  </head>
  <body>

    <div id="panel">
      <div class="panel-inner">

        <div class="ph">
          <div class="ph-left">
            <span class="ph-title">f(x) Explorer XR</span>
            <span class="ph-sub">Galli &amp; Santin</span>
          </div>
          <div class="live-dot" title="live update"></div>
        </div>

        <!-- f(x) formula -->
        <div class="sec-label">Formula</div>
        <div class="fx-row">
          <span class="fx-lbl">f(x)=</span>
          <input id="fxInput" type="text" value="2*x - 1/x" spellcheck="false" autocomplete="off" />
          <button id="applyBtn">PLOT</button>
        </div>
        <div id="fxError"></div>

        <!-- examples -->
        <div class="examples">
          <span class="ex-chip" data-fx="A*sin(B*x)">A·sin(B·x)</span>
          <span class="ex-chip" data-fx="A*x^2 + B">A·x²+B</span>
          <span class="ex-chip" data-fx="sin(A*x)/x">sin(A·x)/x</span>
          <span class="ex-chip" data-fx="A*cos(x) + B*sin(2*x)">cos+sin</span>
          <span class="ex-chip" data-fx="2*x - 1/x">2x−1/x</span>
        </div>

        <div class="div"></div>

        <!-- A, B sliders -->
        <div class="sec-label">Parametri dinamici</div>
        <div class="sr">
          <span class="sn a">A</span>
          <input type="range" id="aSlider" min="-10" max="10" step="0.1" value="1" />
          <span class="sv" id="aValue">1.0</span>
        </div>
        <div class="sr">
          <span class="sn b">B</span>
          <input type="range" id="bSlider" min="-10" max="10" step="0.1" value="1" />
          <span class="sv" id="bValue">1.0</span>
        </div>

        <div class="div"></div>

        <!-- X offset -->
        <div class="sec-label">Offset x</div>
        <div class="sr">
          <span class="sn xo">x</span>
          <input type="range" id="xSlider" min="-31.4" max="31.4" step="0.1" value="0" />
          <span class="sv" id="xValue">0.0</span>
        </div>

        <div class="hint">
          <b>A</b> e <b>B</b> sono parametri live nella formula.<br>
          VR: trigger → ruota/trasla · slider 3D → offset x
        </div>

      </div>
    </div>

    <script type="module">
      import * as THREE from './vendor/three/build/three.module.js';
      import { VRButton } from './vendor/three/examples/jsm/webxr/VRButton.js';

      /* ══ RENDERER ══════════════════════════════════════════ */
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.xr.setReferenceSpaceType('local');
      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));

      /* ══ SCENE ═════════════════════════════════════════════ */
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x04080f);

      const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 100);
      camera.position.set(0, 1.8, 4);

      scene.add(new THREE.HemisphereLight(0xaaccff, 0x101828, 0.85));
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.75);
      dirLight.position.set(5, 7, 5);
      scene.add(dirLight);

      /* ── floor ── */
      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(10, 10),
        new THREE.MeshStandardMaterial({ color: 0x060e1e, roughness: 0.97, metalness: 0.0 })
      );
      floor.rotation.x = -Math.PI / 2;
      scene.add(floor);

      /* ── subtle grid ── */
      const grid = new THREE.GridHelper(8, 20, 0x162a50, 0x0c1a34);
      grid.position.y = 0.001;
      scene.add(grid);

      /* ══ STATE ═════════════════════════════════════════════ */
      let fxCurve = null;
      let xOffset = 0;
      let paramA  = 1;
      let paramB  = 1;
      let fxExpr  = '2*x - 1/x';

      /* ══ AXES GROUP (smaller — scale 0.7) ════════════════ */
      const axesGroup = new THREE.Group();
      axesGroup.position.set(0, 1.2, -0.4);
      axesGroup.scale.setScalar(0.7);   /* ← overall size reduction */
      scene.add(axesGroup);

      createAxes();
      fxCurve = createFxCurve();

      /* ══ VR SLIDER ══════════════════════════════════════════ */
      const sliderGroup = createVRSlider();
      scene.add(sliderGroup);

      /* ══ CONTROLLERS (original logic) ══════════════════════ */
      const controllers = [createController(0), createController(1)];
      controllers.forEach(c => scene.add(c));

      const raycaster           = new THREE.Raycaster();
      const tempMatrix          = new THREE.Matrix4();
      let   selectedController  = null;
      let   selectedMode        = null;
      const controllerStartQuat = new THREE.Quaternion();
      const axesStartQuat       = new THREE.Quaternion();
      const controllerStartPos  = new THREE.Vector3();
      const axesStartPos        = new THREE.Vector3();
      let   sliderStartX        = 0;
      let   sliderStartOffset   = 0;

      /* ══ DOM EVENTS ════════════════════════════════════════ */
      const xSlider = document.getElementById('xSlider');
      const xValue  = document.getElementById('xValue');
      const aSlider = document.getElementById('aSlider');
      const aValue  = document.getElementById('aValue');
      const bSlider = document.getElementById('bSlider');
      const bValue  = document.getElementById('bValue');

      function syncSliderBg(el) {
        const min = parseFloat(el.min), max = parseFloat(el.max), val = parseFloat(el.value);
        const pct = ((val - min) / (max - min) * 100).toFixed(1) + '%';
        el.style.setProperty('--pct', pct);
      }
      [aSlider, bSlider, xSlider].forEach(s => syncSliderBg(s));

      xSlider.addEventListener('input', e => {
        xOffset = parseFloat(e.target.value);
        xValue.textContent = xOffset.toFixed(1);
        syncSliderBg(e.target);
        updateFxCurve();
        updateSliderThumb();
      });

      aSlider.addEventListener('input', e => {
        paramA = parseFloat(e.target.value);
        aValue.textContent = paramA.toFixed(1);
        syncSliderBg(e.target);
        updateFxCurve();
      });

      bSlider.addEventListener('input', e => {
        paramB = parseFloat(e.target.value);
        bValue.textContent = paramB.toFixed(1);
        syncSliderBg(e.target);
        updateFxCurve();
      });

      document.getElementById('applyBtn').addEventListener('click', applyFx);
      document.getElementById('fxInput').addEventListener('keydown', e => { if (e.key === 'Enter') applyFx(); });

      /* example chips */
      document.querySelectorAll('.ex-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.getElementById('fxInput').value = chip.dataset.fx;
          applyFx();
        });
      });

      window.addEventListener('resize', onWindowResize);
      renderer.setAnimationLoop(render);

      /* ══ f(x) COMPILE ══════════════════════════════════════ */
      function buildEval(expr) {
        const e = expr
          .replace(/\^/g,      '**')
          .replace(/\bsin\b/g,  'Math.sin')
          .replace(/\bcos\b/g,  'Math.cos')
          .replace(/\btan\b/g,  'Math.tan')
          .replace(/\bsqrt\b/g, 'Math.sqrt')
          .replace(/\babs\b/g,  'Math.abs')
          .replace(/\bexp\b/g,  'Math.exp')
          .replace(/\blog\b/g,  'Math.log')
          .replace(/\bpi\b/gi,  'Math.PI')
          .replace(/\be\b/g,    'Math.E');
        // eslint-disable-next-line no-new-func
        return new Function('x', 'A', 'B', `"use strict"; return (${e});`);
      }

      function applyFx() {
        const raw = document.getElementById('fxInput').value.trim();
        const errEl = document.getElementById('fxError');
        if (!raw) return;
        try {
          buildEval(raw)(1, paramA, paramB); /* test call */
          errEl.textContent = '';
          fxExpr = raw;
          updateFxCurve();
        } catch (_) {
          errEl.textContent = '\u26a0 espressione non valida';
        }
      }

      /* ══ CURVE ══════════════════════════════════════════════ */
      function updateFxCurve() {
        if (fxCurve) { axesGroup.remove(fxCurve); fxCurve = null; }
        fxCurve = createFxCurve();
      }

      function updateSliderThumb() {
        const thumb = sliderGroup.getObjectByName('sliderThumb');
        if (!thumb) return;
        const norm = (xOffset - (-31.4)) / 62.8;
        thumb.position.x = -3.14 + norm * 6.28;
      }

      function createFxCurve() {
        let fn;
        try { fn = buildEval(fxExpr); } catch (_) { return null; }

        const points   = [];
        const segments = [];          /* break curve at discontinuities */
        let   seg      = [];

        const start = -Math.PI * 4;
        const end   =  Math.PI * 4;
        const step  = 0.05;
        const SCALE_X = 0.3;
        const SCALE_Y = 0.55;
        const CLAMP   = 5.0;          /* world-units, after scaling */

        for (let t = start; t <= end + step * 0.5; t += step) {
          const x = t + xOffset;
          let y;
          try {
            y = fn(x, paramA, paramB);
          } catch (_) { y = NaN; }

          if (!isFinite(y) || Math.abs(y * SCALE_Y) > CLAMP) {
            if (seg.length > 1) segments.push(seg);
            seg = [];
          } else {
            seg.push(new THREE.Vector3(x * SCALE_X, y * SCALE_Y, 0));
          }
        }
        if (seg.length > 1) segments.push(seg);

        /* each continuous segment = one Line */
        const group = new THREE.Group();
        const mat   = new THREE.LineBasicMaterial({ color: 0xffdd55, linewidth: 2 });
        segments.forEach(pts => {
          const geo   = new THREE.BufferGeometry().setFromPoints(pts);
          group.add(new THREE.Line(geo, mat));
        });
        group.position.y = 0.01;
        axesGroup.add(group);
        return group;
      }

      /* ══ AXES ═══════════════════════════════════════════════ */
      function createAxes() {
        const length    = 3.0;
        const thickness = 0.025;

        /* axis materials – coloured per axis */
        const mX = new THREE.MeshStandardMaterial({ color: 0x5ae4ff, roughness:0.3, metalness:0.3, emissive:0x1a5070, emissiveIntensity:0.4 });
        const mY = new THREE.MeshStandardMaterial({ color: 0x7affa0, roughness:0.3, metalness:0.3, emissive:0x105030, emissiveIntensity:0.4 });
        const mZ = new THREE.MeshStandardMaterial({ color: 0xff7aac, roughness:0.3, metalness:0.3, emissive:0x501030, emissiveIntensity:0.4 });

        /* cylinders */
        const xCyl = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), mX);
        xCyl.rotation.z = -Math.PI / 2; xCyl.position.x = length / 2;
        axesGroup.add(xCyl);

        const yCyl = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), mY);
        yCyl.position.y = length / 2;
        axesGroup.add(yCyl);

        const zCyl = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), mZ);
        zCyl.rotation.x = Math.PI / 2; zCyl.position.z = length / 2;
        axesGroup.add(zCyl);

        /* cones */
        const cone = new THREE.ConeGeometry(0.07, 0.22, 16);
        const xArr = new THREE.Mesh(cone, mX); xArr.rotation.z = -Math.PI/2; xArr.position.set(length, 0, 0);
        const yArr = new THREE.Mesh(cone, mY); yArr.position.set(0, length, 0);
        const zArr = new THREE.Mesh(cone, mZ); zArr.rotation.x =  Math.PI/2; zArr.position.set(0, 0, length);
        axesGroup.add(xArr, yArr, zArr);

        /* tick marks on X axis */
        for (let i = -4; i <= 4; i++) {
          if (i === 0) continue;
          const tick = new THREE.Mesh(
            new THREE.BoxGeometry(0.015, 0.1, 0.015),
            new THREE.MeshStandardMaterial({ color: 0x3a7088, roughness: 0.6 })
          );
          tick.position.set(i * 0.3 * 3.14 / 4, 0, 0); /* map ticks to π fractions */
          axesGroup.add(tick);
        }

        /* labels */
        axesGroup.add(createLabel('X', length + 0.2,  0,           0,          '#7ae4ff'));
        axesGroup.add(createLabel('Y', 0,             length + 0.2, 0,          '#7affaa'));
        axesGroup.add(createLabel('Z', 0,             0,            length+0.2, '#ff9abc'));
      }

      function createLabel(text, x, y, z, color) {
        const cv  = document.createElement('canvas');
        cv.width  = 128; cv.height = 64;
        const ctx = cv.getContext('2d');
        ctx.clearRect(0, 0, 128, 64);
        ctx.font = 'bold 48px system-ui';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = color || '#c8f4ff';
        ctx.fillText(text, 64, 34);
        const tex = new THREE.CanvasTexture(cv);
        tex.encoding = THREE.sRGBEncoding;
        const mesh = new THREE.Mesh(
          new THREE.PlaneGeometry(0.28, 0.14),
          new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false })
        );
        mesh.position.set(x, y, z);
        mesh.lookAt(camera.position);
        return mesh;
      }

      /* ══ VR SLIDER (original logic intact) ════════════════ */
      function createVRSlider() {
        const group = new THREE.Group();
        group.position.set(0, 0.5, 0.2);

        const track = new THREE.Mesh(
          new THREE.BoxGeometry(6.28, 0.06, 0.06),
          new THREE.MeshStandardMaterial({ color: 0x163050, roughness: 0.8, metalness: 0.2 })
        );
        track.name = 'sliderTrack';
        group.add(track);

        const thumb = new THREE.Mesh(
          new THREE.BoxGeometry(0.2, 0.15, 0.15),
          new THREE.MeshStandardMaterial({
            color: 0xfad85a, roughness: 0.3, metalness: 0.6,
            emissive: 0xfad85a, emissiveIntensity: 0.35
          })
        );
        thumb.name = 'sliderThumb';
        group.add(thumb);

        return group;
      }

      /* ══ CONTROLLERS (original) ════════════════════════════ */
      function createController(index) {
        const controller = renderer.xr.getController(index);
        controller.addEventListener('selectstart', onSelectStart);
        controller.addEventListener('selectend',   onSelectEnd);

        const ray = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-1)]),
          new THREE.LineBasicMaterial({ color: 0x5ae4ff })
        );
        ray.name = 'ray'; ray.scale.z = 6;
        controller.add(ray);

        const pointer = new THREE.Mesh(
          new THREE.SphereGeometry(0.015, 16, 12),
          new THREE.MeshBasicMaterial({ color: 0x5ae4ff, opacity: 0.9, transparent: true })
        );
        pointer.position.set(0, 0, -1);
        controller.add(pointer);

        return controller;
      }

      function onSelectStart(event) {
        const controller   = event.target;
        const intersections = getControllerIntersections(controller);
        if (!intersections.length) return;
        const hit = intersections[0].object;
        if (hit.name === 'sliderThumb' || hit.name === 'sliderTrack') {
          selectedMode       = 'slider';
          selectedController = controller;
          sliderStartX       = intersections[0].point.x;
          sliderStartOffset  = xOffset;
        } else {
          selectedMode       = 'transform';
          selectedController = controller;
          controllerStartQuat.copy(controller.quaternion);
          axesStartQuat.copy(axesGroup.quaternion);
          controllerStartPos.setFromMatrixPosition(controller.matrixWorld);
          axesStartPos.copy(axesGroup.position);
        }
      }

      function onSelectEnd() { selectedController = null; selectedMode = null; }

      function getControllerIntersections(controller) {
        tempMatrix.identity().extractRotation(controller.matrixWorld);
        raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
        raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
        return raycaster.intersectObjects(sliderGroup.children, true)
                        .concat(raycaster.intersectObjects(axesGroup.children, true));
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      /* ══ RENDER LOOP (original) ════════════════════════════ */
      function render() {
        if (selectedController && selectedMode === 'transform') {
          const currentQuat = selectedController.quaternion.clone();
          const deltaQuat   = currentQuat.multiply(controllerStartQuat.clone().invert());
          axesGroup.quaternion.copy(axesStartQuat).premultiply(deltaQuat);
          const currentPos  = new THREE.Vector3().setFromMatrixPosition(selectedController.matrixWorld);
          const deltaPos    = currentPos.clone().sub(controllerStartPos);
          axesGroup.position.copy(axesStartPos).add(deltaPos);

        } else if (selectedController && selectedMode === 'slider') {
          tempMatrix.identity().extractRotation(selectedController.matrixWorld);
          raycaster.ray.origin.setFromMatrixPosition(selectedController.matrixWorld);
          raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
          const hits = raycaster.intersectObjects(sliderGroup.children, true);
          if (hits.length) {
            const deltaX         = hits[0].point.x - sliderStartX;
            const normalizedDelta = deltaX / 6.28;           /* track length */
            xOffset = sliderStartOffset + normalizedDelta * 62.8;
            xOffset = Math.max(-31.4, Math.min(31.4, xOffset));
            xSlider.value         = xOffset;
            xValue.textContent    = xOffset.toFixed(1);
            syncSliderBg(xSlider);
            updateFxCurve();
            updateSliderThumb();
          }
        }

        renderer.render(scene, camera);
      }
    </script>
  </body>
