<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galli, Santin — f(x) XR</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&display=swap');

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body, html {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #050a18;
        color: #d6eeff;
        font-family: 'IBM Plex Mono', monospace;
      }

      /* ─── PANEL ───────────────────────────────────────── */
      #panel {
        position: absolute;
        left: 1rem; top: 1rem;
        width: 320px;
        z-index: 10;
        background: rgba(3, 9, 22, 0.86);
        border: 1px solid rgba(90, 228, 255, 0.14);
        border-radius: 14px;
        padding: 1rem 1.1rem 1.1rem;
        backdrop-filter: blur(20px) saturate(1.5);
        box-shadow:
          0 0 0 1px rgba(90,228,255,0.04) inset,
          0 4px 32px rgba(0,0,0,0.6),
          0 0 48px rgba(90,228,255,0.05);
      }

      /* header */
      .ph {
        display: flex; align-items: baseline; gap: 0.45rem;
        padding-bottom: 0.7rem;
        border-bottom: 1px solid rgba(90,228,255,0.1);
        margin-bottom: 0.85rem;
      }
      .ph-title {
        font-family: 'Syne', sans-serif;
        font-weight: 800; font-size: 0.95rem;
        color: #5ae4ff; letter-spacing: 0.02em;
      }
      .ph-sub {
        font-size: 0.68rem;
        color: rgba(214,238,255,0.4);
      }

      /* f(x) row */
      .fx-row {
        display: flex; align-items: center; gap: 0.4rem;
        margin-bottom: 0.35rem;
      }
      .fx-lbl {
        font-family: 'Syne', sans-serif;
        font-weight: 700; font-size: 0.82rem;
        color: #ffd95a; white-space: nowrap; flex-shrink: 0;
      }
      #fxInput {
        flex: 1; min-width: 0;
        background: rgba(90,228,255,0.06);
        border: 1px solid rgba(90,228,255,0.2);
        border-radius: 7px;
        padding: 0.35rem 0.6rem;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.82rem;
        color: #d6eeff; outline: none;
        transition: border-color .2s, box-shadow .2s;
      }
      #fxInput:focus {
        border-color: #5ae4ff;
        box-shadow: 0 0 0 3px rgba(90,228,255,0.1);
      }
      #applyBtn {
        flex-shrink: 0;
        background: #5ae4ff; color: #02060f;
        border: none; border-radius: 7px;
        padding: 0.35rem 0.65rem;
        font-family: 'Syne', sans-serif;
        font-weight: 800; font-size: 0.72rem;
        cursor: pointer; letter-spacing: 0.05em;
        transition: opacity .15s, transform .1s;
      }
      #applyBtn:hover { opacity: 0.82; }
      #applyBtn:active { transform: scale(0.95); }

      #fxError {
        font-size: 0.7rem; color: #ff6b9d;
        height: 0.9rem; margin-bottom: 0.5rem;
        padding-left: 0.2rem;
      }

      /* divider */
      .div { height: 1px; background: rgba(90,228,255,0.09); margin: 0.7rem 0; }

      /* slider rows */
      .sr {
        display: grid;
        grid-template-columns: 28px 1fr 52px;
        gap: 0.45rem; align-items: center;
        margin-bottom: 0.55rem;
      }
      .sr:last-child { margin-bottom: 0; }
      .sn {
        font-family: 'Syne', sans-serif;
        font-weight: 800; font-size: 0.82rem;
        text-align: center; line-height: 1;
      }
      .sn.a { color: #5ae4ff; }
      .sn.b { color: #ff6b9d; }
      .sn.x { color: #ffd95a; }
      .sv {
        font-size: 0.75rem; text-align: right;
        color: rgba(214,238,255,0.5);
        font-variant-numeric: tabular-nums;
      }

      /* range shared */
      input[type='range'] {
        -webkit-appearance: none; appearance: none;
        width: 100%; height: 4px; border-radius: 2px;
        background: #0d2340; outline: none; cursor: pointer;
      }

      /* A – cyan */
      #aSlider::-webkit-slider-thumb { -webkit-appearance:none; width:15px; height:15px; border-radius:50%; background:#5ae4ff; box-shadow:0 0 8px rgba(90,228,255,0.6); }
      #aSlider::-moz-range-thumb     { width:15px; height:15px; border-radius:50%; background:#5ae4ff; border:none; box-shadow:0 0 8px rgba(90,228,255,0.6); }

      /* B – pink */
      #bSlider::-webkit-slider-thumb { -webkit-appearance:none; width:15px; height:15px; border-radius:50%; background:#ff6b9d; box-shadow:0 0 8px rgba(255,107,157,0.6); }
      #bSlider::-moz-range-thumb     { width:15px; height:15px; border-radius:50%; background:#ff6b9d; border:none; box-shadow:0 0 8px rgba(255,107,157,0.6); }

      /* X – yellow */
      #xSlider::-webkit-slider-thumb { -webkit-appearance:none; width:15px; height:15px; border-radius:50%; background:#ffd95a; box-shadow:0 0 8px rgba(255,217,90,0.6); }
      #xSlider::-moz-range-thumb     { width:15px; height:15px; border-radius:50%; background:#ffd95a; border:none; box-shadow:0 0 8px rgba(255,217,90,0.6); }

      /* hint */
      .hint {
        font-size: 0.68rem;
        color: rgba(214,238,255,0.35);
        line-height: 1.6;
        margin-top: 0.6rem;
      }
      .hint b { color: rgba(90,228,255,0.7); font-weight: 400; }

      canvas { display: block; }
    </style>
  </head>
  <body>

    <div id="panel">
      <div class="ph">
        <span class="ph-title">f(x) Explorer XR</span>
        <span class="ph-sub">Galli, Santin</span>
      </div>

      <div class="fx-row">
        <span class="fx-lbl">f(x) =</span>
        <input id="fxInput" type="text" value="2*x - 1/x" spellcheck="false" autocomplete="off" />
        <button id="applyBtn">PLOT</button>
      </div>
      <div id="fxError"></div>

      <div class="sr">
        <span class="sn a">A</span>
        <input type="range" id="aSlider" min="-10" max="10" step="0.1" value="1" />
        <span class="sv" id="aValue">1.0</span>
      </div>
      <div class="sr">
        <span class="sn b">B</span>
        <input type="range" id="bSlider" min="-10" max="10" step="0.1" value="1" />
        <span class="sv" id="bValue">1.0</span>
      </div>

      <div class="div"></div>

      <div class="sr">
        <span class="sn x">x&#8596;</span>
        <input type="range" id="xSlider" min="-31.4" max="31.4" step="0.1" value="0" />
        <span class="sv" id="xValue">0.0</span>
      </div>

      <div class="hint">
        Usa <b>A</b> e <b>B</b> nella formula &mdash; es. <b>A*sin(B*x)</b><br>
        VR: trigger &rarr; ruota/trasla &nbsp;&middot;&nbsp; slider 3D &rarr; x offset
      </div>
    </div>

    <script type="module">
      import * as THREE from './vendor/three/build/three.module.js';
      import { VRButton } from './vendor/three/examples/jsm/webxr/VRButton.js';

      /* ── renderer ── */
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.xr.setReferenceSpaceType('local');
      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));

      /* ── scene ── */
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x050a18);

      const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 100);
      camera.position.set(0, 1.8, 4);

      scene.add(new THREE.HemisphereLight(0xffffff, 0x202035, 0.9));
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(5, 7, 5);
      scene.add(dirLight);

      /* ── floor / grid ── */
      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(10, 10),
        new THREE.MeshStandardMaterial({ color: 0x081025, roughness: 0.95, metalness: 0.05 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = 0;
      scene.add(floor);

      const grid = new THREE.GridHelper(8, 16, 0x204b8a, 0x10203a);
      grid.position.y = 0.001;
      scene.add(grid);

      /* ── axes group ── */
      const axesGroup = new THREE.Group();
      axesGroup.position.set(0, 1.25, -0.5);
      scene.add(axesGroup);

      /* ── state ── */
      let fxCurve = null;
      let xOffset = 0;
      let paramA  = 1;
      let paramB  = 1;
      let fxExpr  = '2*x - 1/x';

      createAxes();
      fxCurve = createFxCurve(xOffset);

      const sliderGroup = createVRSlider();
      scene.add(sliderGroup);

      const controllers = [createController(0), createController(1)];
      controllers.forEach(c => scene.add(c));

      /* ── controller state (original) ── */
      const raycaster           = new THREE.Raycaster();
      const tempMatrix          = new THREE.Matrix4();
      let   selectedController  = null;
      let   selectedMode        = null;
      const controllerStartQuat = new THREE.Quaternion();
      const axesStartQuat       = new THREE.Quaternion();
      const controllerStartPos  = new THREE.Vector3();
      const axesStartPos        = new THREE.Vector3();
      let   sliderStartX        = 0;
      let   sliderStartOffset   = 0;

      /* ── DOM refs ── */
      const xSlider = document.getElementById('xSlider');
      const xValue  = document.getElementById('xValue');
      const aSlider = document.getElementById('aSlider');
      const aValue  = document.getElementById('aValue');
      const bSlider = document.getElementById('bSlider');
      const bValue  = document.getElementById('bValue');

      xSlider.addEventListener('input', e => {
        xOffset = parseFloat(e.target.value);
        xValue.textContent = xOffset.toFixed(1);
        updateFxCurve();
        updateSliderThumb();
      });

      aSlider.addEventListener('input', e => {
        paramA = parseFloat(e.target.value);
        aValue.textContent = paramA.toFixed(1);
        updateFxCurve();
      });

      bSlider.addEventListener('input', e => {
        paramB = parseFloat(e.target.value);
        bValue.textContent = paramB.toFixed(1);
        updateFxCurve();
      });

      document.getElementById('applyBtn').addEventListener('click', applyFx);
      document.getElementById('fxInput').addEventListener('keydown', e => { if (e.key === 'Enter') applyFx(); });

      window.addEventListener('resize', onWindowResize);
      renderer.setAnimationLoop(render);

      /* ── f(x) compile ── */
      function buildEval(expr) {
        const e = expr
          .replace(/\^/g, '**')
          .replace(/\bsin\b/g,  'Math.sin')
          .replace(/\bcos\b/g,  'Math.cos')
          .replace(/\btan\b/g,  'Math.tan')
          .replace(/\bsqrt\b/g, 'Math.sqrt')
          .replace(/\babs\b/g,  'Math.abs')
          .replace(/\bexp\b/g,  'Math.exp')
          .replace(/\blog\b/g,  'Math.log')
          .replace(/\bpi\b/gi,  'Math.PI')
          .replace(/\be\b/g,    'Math.E');
        // eslint-disable-next-line no-new-func
        return new Function('x', 'A', 'B', `"use strict"; return (${e});`);
      }

      function applyFx() {
        const raw = document.getElementById('fxInput').value.trim();
        const err = document.getElementById('fxError');
        if (!raw) return;
        try {
          buildEval(raw)(0, 1, 1);
          err.textContent = '';
          fxExpr = raw;
          updateFxCurve();
        } catch (_) {
          err.textContent = '\u26a0 espressione non valida';
        }
      }

      /* ── curve helpers ── */
      function updateFxCurve() {
        if (fxCurve) axesGroup.remove(fxCurve);
        fxCurve = createFxCurve(xOffset);
      }

      function updateSliderThumb() {
        const thumb = sliderGroup.getObjectByName('sliderThumb');
        if (!thumb) return;
        const normalizedValue = (xOffset - (-31.4)) / (62.8);
        thumb.position.x = -3.14 + normalizedValue * 6.28;
      }

      /* ── VR slider (original) ── */
      function createVRSlider() {
        const group = new THREE.Group();
        group.position.set(0, 0.5, 0.2);

        const trackGeometry = new THREE.BoxGeometry(6.28, 0.06, 0.06);
        const trackMaterial = new THREE.MeshStandardMaterial({ color: 0x1a3a5c, roughness: 0.8, metalness: 0.2 });
        const track = new THREE.Mesh(trackGeometry, trackMaterial);
        track.name = 'sliderTrack';
        group.add(track);

        const thumbGeometry = new THREE.BoxGeometry(0.2, 0.15, 0.15);
        const thumbMaterial = new THREE.MeshStandardMaterial({
          color: 0xffd95a, roughness: 0.3, metalness: 0.6,
          emissive: 0xffd95a, emissiveIntensity: 0.3
        });
        const thumb = new THREE.Mesh(thumbGeometry, thumbMaterial);
        thumb.name = 'sliderThumb';
        thumb.position.x = 0;
        group.add(thumb);

        return group;
      }

      /* ── axes (original logic) ── */
      function createAxes() {
        const material = new THREE.MeshStandardMaterial({ color: 0x88c8ff, roughness: 0.3, metalness: 0.2 });
        const length = 2.5;
        const thickness = 0.022;

        const xAxis = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), material);
        xAxis.rotation.z = -Math.PI / 2; xAxis.position.x = length / 2;
        axesGroup.add(xAxis);

        const yAxis = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), material);
        yAxis.position.y = length / 2;
        axesGroup.add(yAxis);

        const zAxis = new THREE.Mesh(new THREE.CylinderGeometry(thickness, thickness, length, 12), material);
        zAxis.rotation.x = Math.PI / 2; zAxis.position.z = length / 2;
        axesGroup.add(zAxis);

        const arrow = new THREE.ConeGeometry(0.065, 0.2, 16);

        const xArrow = new THREE.Mesh(arrow, material);
        xArrow.rotation.z = -Math.PI / 2; xArrow.position.set(length, 0, 0);
        axesGroup.add(xArrow);

        const yArrow = new THREE.Mesh(arrow, material);
        yArrow.position.set(0, length, 0);
        axesGroup.add(yArrow);

        const zArrow = new THREE.Mesh(arrow, material);
        zArrow.rotation.x = Math.PI / 2; zArrow.position.set(0, 0, length);
        axesGroup.add(zArrow);

        axesGroup.add(createLabel('X', length + 0.18, 0, 0));
        axesGroup.add(createLabel('Y', 0, length + 0.18, 0));
        axesGroup.add(createLabel('Z', 0, 0, length + 0.18));
      }

      function createLabel(text, x, y, z) {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(5,9,24,0.0)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 70px system-ui, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#ccf6ff';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        const texture = new THREE.CanvasTexture(canvas);
        texture.encoding = THREE.sRGBEncoding;
        const label = new THREE.Mesh(
          new THREE.PlaneGeometry(0.32, 0.16),
          new THREE.MeshBasicMaterial({ map: texture, transparent: true })
        );
        label.position.set(x, y, z);
        label.lookAt(camera.position);
        return label;
      }

      /* ── curve generation ── */
      function createFxCurve(xOff) {
        let fn;
        try { fn = buildEval(fxExpr); } catch (_) { return null; }

        const points = [];
        const start = -Math.PI * 4, end = Math.PI * 4, step = 0.08;
        for (let x = start; x <= end; x += step) {
          const adjustedX = x + xOff;
          let y = 0;
          try {
            y = fn(adjustedX, paramA, paramB);
            if (!isFinite(y) || Math.abs(y) > 500) y = 0;
          } catch (_) { y = 0; }
          points.push(new THREE.Vector3(adjustedX * 0.28, y * 0.7, 0));
        }

        const curveGeometry = new THREE.BufferGeometry().setFromPoints(points);
        const curveMaterial = new THREE.LineBasicMaterial({ color: 0xffd568, linewidth: 2 });
        const curve = new THREE.Line(curveGeometry, curveMaterial);
        curve.position.y = 0.02;
        axesGroup.add(curve);
        return curve;
      }

      /* ── controllers (original) ── */
      function createController(index) {
        const controller = renderer.xr.getController(index);
        controller.addEventListener('selectstart', onSelectStart);
        controller.addEventListener('selectend', onSelectEnd);

        const ray = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-1)]),
          new THREE.LineBasicMaterial({ color: 0x88c8ff })
        );
        ray.name = 'ray'; ray.scale.z = 6;
        controller.add(ray);

        const pointer = new THREE.Mesh(
          new THREE.SphereGeometry(0.015, 16, 12),
          new THREE.MeshBasicMaterial({ color: 0x88c8ff, opacity: 0.9, transparent: true })
        );
        pointer.position.set(0, 0, -1);
        controller.add(pointer);

        return controller;
      }

      function onSelectStart(event) {
        const controller = event.target;
        const intersections = getControllerIntersections(controller);
        if (intersections.length) {
          const hitObject = intersections[0].object;
          if (hitObject.name === 'sliderThumb' || hitObject.name === 'sliderTrack') {
            selectedMode = 'slider';
            selectedController = controller;
            sliderStartX = intersections[0].point.x;
            sliderStartOffset = xOffset;
          } else {
            selectedMode = 'transform';
            selectedController = controller;
            controllerStartQuat.copy(controller.quaternion);
            axesStartQuat.copy(axesGroup.quaternion);
            controllerStartPos.setFromMatrixPosition(controller.matrixWorld);
            axesStartPos.copy(axesGroup.position);
          }
        }
      }

      function onSelectEnd() {
        selectedController = null;
        selectedMode = null;
      }

      function getControllerIntersections(controller) {
        tempMatrix.identity().extractRotation(controller.matrixWorld);
        raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
        raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
        return raycaster.intersectObjects(sliderGroup.children, true)
          .concat(raycaster.intersectObjects(axesGroup.children, true));
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      /* ── render loop (original) ── */
      function render() {
        if (selectedController && selectedMode === 'transform') {
          const currentQuat = selectedController.quaternion.clone();
          const deltaQuat = currentQuat.multiply(controllerStartQuat.clone().invert());
          axesGroup.quaternion.copy(axesStartQuat).premultiply(deltaQuat);
          const currentPos = new THREE.Vector3().setFromMatrixPosition(selectedController.matrixWorld);
          const deltaPos = currentPos.clone().sub(controllerStartPos);
          axesGroup.position.copy(axesStartPos).add(deltaPos);
        } else if (selectedController && selectedMode === 'slider') {
          tempMatrix.identity().extractRotation(selectedController.matrixWorld);
          raycaster.ray.origin.setFromMatrixPosition(selectedController.matrixWorld);
          raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
          const sliderIntersections = raycaster.intersectObjects(sliderGroup.children, true);
          if (sliderIntersections.length) {
            const currentX = sliderIntersections[0].point.x;
            const deltaX = currentX - sliderStartX;
            const minX = -3.14, maxX = 3.14;
            const trackLength = maxX - minX;
            const normalizedDelta = deltaX / trackLength;
            const offsetRange = 31.4 - (-31.4);
            xOffset = sliderStartOffset + normalizedDelta * offsetRange;
            xOffset = Math.max(-31.4, Math.min(31.4, xOffset));
            xSlider.value = xOffset;
            xValue.textContent = xOffset.toFixed(1);
            updateFxCurve();
            updateSliderThumb();
          }
        }
        renderer.render(scene, camera);
      }
    </script>
  </body>
</html>
